networks:
  coolify:
    external: true

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bambam-api
    networks:
      - coolify
      - default
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/outputs:/data/outputs
      - ./data/db:/data/db
      - ./data/temp:/data/temp
    depends_on:
      - redis
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.bambam-api.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.bambam-api-bodysize.buffering.maxRequestBodyBytes=268435456"
      - "traefik.http.middlewares.bambam-api-bodysize.buffering.memRequestBodyBytes=33554432"
      - "traefik.http.serversTransports.bambam-api-transport.forwardingTimeouts.responseHeaderTimeout=600s"
      - "traefik.http.serversTransports.bambam-api-transport.forwardingTimeouts.idleConnTimeout=600s"
      - "traefik.http.serversTransports.bambam-api-transport.forwardingTimeouts.dialTimeout=60s"
      - "traefik.http.services.bambam-api.loadbalancer.serversTransport=bambam-api-transport"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bambam-worker
    command: python -m app.worker
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/outputs:/data/outputs
      - ./data/db:/data/db
      - ./data/temp:/data/temp
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "print('worker-ok')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: bambam-frontend
    networks:
      - coolify
      - default
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: bambam-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
