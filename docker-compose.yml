services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bambam-api
    ports:
      - "${API_PUBLIC_PORT:-8000}:8000"
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/outputs:/data/outputs
      - ./data/db:/data/db
      - ./data/temp:/data/temp
    depends_on:
      - redis
    restart: unless-stopped
    labels:
      - "traefik.http.middlewares.bambam-api-bodysize.buffering.maxRequestBodyBytes=268435456"
      - "traefik.http.middlewares.bambam-api-bodysize.buffering.memRequestBodyBytes=33554432"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python -m app.worker
    environment:
      - WORKER_COMPOSE_FILE=/workspace/docker-compose.yml
      - WORKER_COMPOSE_PROJECT_DIR=/workspace
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace
      - ./data/uploads:/data/uploads
      - ./data/outputs:/data/outputs
      - ./data/db:/data/db
      - ./data/temp:/data/temp
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "print('worker-ok')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: bambam-frontend
    ports:
      - "${FRONTEND_PUBLIC_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: bambam-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_BASE_URL=http://api:8000
      - BOT_API_USERNAME=${BOT_API_USERNAME:-admin}
      - BOT_API_PASSWORD=${BOT_API_PASSWORD:-bambam123}
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bambam-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
